name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8

      - run: uv build

      - uses: pypa/gh-action-pypi-publish@release/v1
